services:
  web:
    image: ghcr.io/malvavisc0/korbpuls:latest
    ports:
      - "8000:8000"
    environment:
      KORBPULS_API_KEY: ${KORBPULS_API_KEY}
      KORB_CMD: korb
      CACHE_DIR: /cache
      WORKERS: 2
      # AI settings (leave empty to disable)
      OPENAILIKE_API_BASE: ${OPENAILIKE_API_BASE:-}
      OPENAILIKE_API_KEY: ${OPENAILIKE_API_KEY:-}
      OPENAILIKE_LLM: ${OPENAILIKE_LLM:-}
    volumes:
      - data:/data
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz')",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  data:
