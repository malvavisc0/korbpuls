{% extends "base.html" %}

{% block head %}
<meta http-equiv="refresh" content="3">
<style>
    .spinner {
        width: 40px;
        height: 40px;
        margin: 1.5rem auto;
        border: 4px solid #e0e0e0;
        border-top-color: #333;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
    }
    @keyframes spin {
        to { transform: rotate(360deg); }
    }
</style>
{% endblock %}

{% block title %}Laden… — korbPuls{% endblock %}

{% block main %}
<h1>Daten werden geladen…</h1>
<div class="spinner"></div>
<p>Die Liga-Daten werden heruntergeladen und verarbeitet.</p>
{% endblock %}

{% block footer %}
<a href="/">← Abbrechen</a>
{% endblock %}
