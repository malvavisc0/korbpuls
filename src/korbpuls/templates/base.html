<!DOCTYPE html>
<html lang="de" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="{% block meta_description %}korbPuls analysiert Basketball-Ligen von basketball-bund.net mit Tabelle, Spielplan, Teamstatistiken und KI-gestützten Prognosen auf einen Blick.{% endblock %}">
    <meta name="keywords" content="{% block meta_keywords %}Basketball Liga Analyse, Basketball Tabelle, Spielplan, Teamstatistiken, Saisonprognose, basketball-bund.net, korbPuls{% endblock %}">
    <meta name="robots" content="{% block meta_robots %}index, follow{% endblock %}">
    <meta property="og:type" content="website">
    <meta property="og:title" content="{% block og_title %}{% block title %}korbPuls{% endblock %}{% endblock %}">
    <meta property="og:description" content="{% block og_description %}{% block meta_description_og %}korbPuls analysiert Basketball-Ligen von basketball-bund.net mit Tabelle, Spielplan, Teamstatistiken und KI-gestützten Prognosen auf einen Blick.{% endblock %}{% endblock %}">
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="{% block twitter_title %}{{ self.og_title() }}{% endblock %}">
    <meta name="twitter:description" content="{% block twitter_description %}{{ self.og_description() }}{% endblock %}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link
        rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css"
    >
    <link rel="stylesheet" href="/static/app.css">
    {% block head %}{% endblock %}
    <title>{{ self.title() }}</title>
</head>
<body class="app-shell">
    <header class="site-header">
        <div class="container site-header__inner">
            <nav class="site-nav">
                <a class="brand" href="/">
                    <span class="brand__mark">korbPuls <span class="brand__icon" aria-hidden="true">🏀</span></span>
                    <span class="brand__tagline">Deine Liga. Deine Zahlen.</span>
                </a>
                {% if liga_name %}
                <a class="league-pill" href="/liga/{{ ligaid }}/{{ liga_slug }}">{{ liga_name }}</a>
                {% endif %}
            </nav>
        </div>
    </header>

    <main class="site-main">
        <div class="container page-shell">
            {% block main %}{% endblock %}
        </div>
    </main>

    <footer class="site-footer">
        <div class="container site-footer__inner">
            {% block footer %}
            
            {% endblock %}
            <p class="site-credit">
                Made with ❤️ · Powered by <a href="https://github.com/malvavisc0/korb" target="_blank" rel="noopener">korb</a>
            </p>
        </div>
    </footer>
</body>
</html>
