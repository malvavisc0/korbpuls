{% extends "base.html" %}

{% block title %}Fehler — korbPuls{% endblock %}

{% block main %}
<section class="page--narrow">
    <article class="error-card">
        <p class="eyebrow">Fehlerzustand</p>
        <h1>Fehler</h1>
        <p class="message">{{ message }}</p>
        <p class="hint">{{ hint }}</p>
    </article>
</section>
{% endblock %}

{% block footer %}
<div class="footer-actions">
    {% if retry_url %}
    <form class="inline-form" method="POST" action="{{ retry_url }}">
        <button type="submit">↻ Erneut versuchen</button>
    </form>
    {% endif %}
    <a href="/">← Zur Startseite</a>
</div>
{% endblock %}
